global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: doctor-service
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8081"]

  - job_name: appointment-service
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8082"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
