services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["--http_port=8222"]
    ports:
      - "127.0.0.1:${NATS_PORT:-4222}:4222"
      - "127.0.0.1:${NATS_MONITOR_PORT:-8222}:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  mock-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["/app/bin/mock-gateway"]
    environment:
      GATEWAY_PORT: 8080
    ports:
      - "127.0.0.1:${GATEWAY_PUBLISHED_PORT:-8080}:8080"

  doctor-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /app/doctor-service
    command: ["/app/bin/doctor-service"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/doctor_service?sslmode=disable
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-100}
      DOCTOR_SERVICE_ADDR: :8081
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DOCTOR_PUBLISHED_PORT:-8081}:8081"

  appointment-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /app/appointment-service
    command: ["/app/bin/appointment-service"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/appointment_service?sslmode=disable
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-100}
      APPOINTMENT_SERVICE_ADDR: :8082
      DOCTOR_SERVICE_GRPC_TARGET: doctor-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      doctor-service:
        condition: service_started
    ports:
      - "127.0.0.1:${APPOINTMENT_PUBLISHED_PORT:-8082}:8082"

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["/app/bin/notification-service"]
    environment:
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      GATEWAY_URL: http://mock-gateway:8080
      WORKER_POOL_SIZE: ${WORKER_POOL_SIZE:-3}
      JOB_MAX_RETRIES: ${JOB_MAX_RETRIES:-3}
      JOB_BACKOFF_SECONDS: ${JOB_BACKOFF_SECONDS:-1,2,4}
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-gateway:
        condition: service_started

volumes:
  postgres_data:
