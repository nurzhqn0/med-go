services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONGODB_URI: ${COMPOSE_MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DATABASE: ${COMPOSE_MONGODB_DATABASE:-med_go}
      DOCTOR_SERVICE_ADDR: ${DOCTOR_SERVICE_ADDR:-:8081}
      APPOINTMENT_SERVICE_ADDR: ${APPOINTMENT_SERVICE_ADDR:-:8082}
      DOCTOR_SERVICE_BASE_URL: ${DOCTOR_SERVICE_BASE_URL:-http://127.0.0.1:8081}
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "8081"
      - "8082"
    ports:
      - "127.0.0.1:${DOCTOR_PUBLISHED_PORT:-8081}:8081"
      - "127.0.0.1:${APPOINTMENT_PUBLISHED_PORT:-8082}:8082"

  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    profiles:
      - proxy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - observability
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      node-exporter:
        condition: service_started
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:${PROMETHEUS_PUBLISHED_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    profiles:
      - observability
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:${GRAFANA_PUBLISHED_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro

  node-exporter:
    image: prom/node-exporter:latest
    profiles:
      - observability
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    pid: host
    volumes:
      - /:/host:ro

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:
