services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONGODB_URI: ${COMPOSE_MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DATABASE: ${COMPOSE_MONGODB_DATABASE:-med_go}
      DOCTOR_SERVICE_ADDR: ${DOCTOR_SERVICE_ADDR:-:8081}
      APPOINTMENT_SERVICE_ADDR: ${APPOINTMENT_SERVICE_ADDR:-:8082}
      DOCTOR_SERVICE_BASE_URL: ${DOCTOR_SERVICE_BASE_URL:-http://127.0.0.1:8081}
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "8081"
      - "8082"
    ports:
      - "127.0.0.1:${DOCTOR_PUBLISHED_PORT:-8081}:8081"
      - "127.0.0.1:${APPOINTMENT_PUBLISHED_PORT:-8082}:8082"

  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    profiles:
      - proxy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo_data:
