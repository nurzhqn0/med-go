server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 ipv6=off;

    set $doctor_upstream http://app:8081;
    set $appointment_upstream http://app:8082;

    location = / {
        default_type application/json;
        return 200 '{"service":"med-go-nginx","status":"ok"}';
    }

    location = /doctor-health {
        proxy_pass $doctor_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /appointment-health {
        proxy_pass $appointment_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /doctors {
        proxy_pass $doctor_upstream/doctors;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /doctors/ {
        proxy_pass $doctor_upstream/doctors/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /appointments {
        proxy_pass $appointment_upstream/appointments;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /appointments/ {
        proxy_pass $appointment_upstream/appointments/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
